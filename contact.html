<header>

<main>
  <h2 class="section-title">Get in Touch</h2>
  <p class="section-sub">We usually respond within a few hours. No job too small.</p>
  <form class="contact-form" action="mailto:emreaslann@hotmail.com" method="get">
    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="John Smith" required>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required>
    </div>
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="07700 000 000">
    </div>
    <div class="form-group">
      <label for="message">How can we help?</label>
      <textarea id="message" name="body" placeholder="Describe your issue..."></textarea>
    </div>
    <button type="submit" class="btn-submit">Send Message</button>
  </form>
  <div class="contact-info">
    <h3>Direct Contact</h3>
    <p>📞 <a href="tel:07944405398">07944 405 3998</a></p>
    <p>✉️ <a href="mailto:emreaslann@hotmail.com">emreaslann@hotmail.com</a></p>
